<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MObywatele</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #1a1a2e;
    font-family: "Courier New", monospace;
    color: #fff;
    overflow: hidden;
  
    /* Force landscape on mobile via rotation wrapper */
  }
  #screen { width: 100vw; height: 100vh; position: relative; }



  /* ── LOBBY ────────────────────────────────────────────── */
  #lobby {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; background: #1a1a2e; overflow-y: auto; padding: 1em 0 1.5em;
  }
  #lobby h1 {
    font-size: clamp(1.6rem, 5vw, 3.5rem); letter-spacing: 0.2em;
    color: #f0e040; text-shadow: 3px 3px 0 #b8a800; margin-bottom: 0.15em;
  }
  #lobby p.sub { color: #aaa; margin-bottom: 1em; font-size: 0.85rem; letter-spacing: 0.1em; }

  #char-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.6em;
    width: min(94vw, 600px);
    margin-bottom: 1em;
  }
  @media (max-width: 480px) {
    #char-grid { grid-template-columns: repeat(4, 1fr); gap: 0.4em; }
  }

  .char-card {
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; padding: 0.5em 0.3em 0.4em;
    border-radius: 8px; border: 3px solid transparent;
    background: #16213e;
    -webkit-user-select: none; user-select: none;
  }
  .char-card:active   { border-color: #f0e040; background: #0f3460; }
  .char-card.selected { border-color: #f0e040; background: #0f3460; box-shadow: 0 0 12px #f0e04088; }

  .char-thumb {
    width: 60px; height: 72px;
    display: flex; align-items: flex-end; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }
  .char-thumb img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    display: block;
  }
  .char-card span {
    margin-top: 0.25em; font-size: 0.6rem; color: #f0e040;
    letter-spacing: 0.03em; text-align: center; word-break: break-word;
  }

  #start-btn {
    padding: 0.6em 2em; font-size: 1rem; font-family: "Courier New", monospace;
    background: #f0e040; color: #1a1a2e; border: none; border-radius: 4px;
    cursor: pointer; font-weight: bold; letter-spacing: 0.1em;
    box-shadow: 4px 4px 0 #b8a800;
    -webkit-user-select: none; user-select: none;
  }
  #start-btn:not(:disabled):active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #b8a800; }
  #start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── GAME ───────────────────────────────────────────────── */
  #game-screen { display: none; position: relative; width: 100vw; height: 100vh; }
  #gameCanvas  { display: block; width: 100%; height: 100%; touch-action: none; }

  #hud {
    position: absolute; top: 0.6em; left: 0; width: 100%;
    display: flex; justify-content: space-between; padding: 0 1em;
    pointer-events: none;
  }
  #hud-score { font-size: 1.3rem; color: #f0e040; text-shadow: 2px 2px 0 #000; }
  #hud-hi    { font-size: 0.9rem; color: #aaa;    text-shadow: 1px 1px 0 #000; }

  /* ── GAME OVER ──────────────────────────────────────────── */
  #gameover {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.88); flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: auto; touch-action: manipulation;
    -webkit-overflow-scrolling: touch;
  }
  #gameover h2 { font-size: clamp(1.8rem,5vw,3rem); color: #f0e040; text-shadow: 3px 3px 0 #b8a800; margin-bottom: 0.3em; }
  #gameover p  { font-size: 1rem; color: #fff; margin-bottom: 0.2em; }
  .btn-row { display: flex; gap: 0.8em; margin-top: 0.9em; flex-wrap: wrap; justify-content: center; }
  .go-btn  { padding: 0.5em 1.4em; font-size: 0.9rem; font-family: "Courier New", monospace;
             border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
  #btn-retry { background: #f0e040; color: #1a1a2e; box-shadow: 3px 3px 0 #b8a800; }
  #btn-menu  { background: #444;    color: #fff;    box-shadow: 3px 3px 0 #222; }

  .lb-wrap { margin-top: 0.6em; text-align: center; }
  .lb-wrap h3 { font-size: 0.8rem; color: #f0e040; margin-bottom: 0.2em; letter-spacing: 0.08em; }
  .lb-wrap ul { list-style: none; font-size: 0.75rem; color: #ccc; }
  .lb-wrap ul li { margin-bottom: 0.1em; }
</style>
</head>
<body>


<div id="screen">
  <!-- LOBBY -->
  <div id="lobby">
    <h1>MObywatele</h1>
    <div id="debug-box" style="background:#111;border:2px solid #f0e040;border-radius:6px;padding:0.5em 0.8em;margin-bottom:0.8em;font-size:0.65rem;color:#0f0;max-width:90vw;text-align:left;word-break:break-all;">
      <div id="dbg">Audio debug v3 (Blob)...</div>
      <button onclick="dbgTestAudio()" style="margin-top:0.3em;padding:0.3em 0.8em;background:#f0e040;color:#000;border:none;border-radius:3px;cursor:pointer;font-family:monospace;font-size:0.65rem;">TAP TO TEST AUDIO</button>
    </div>
    <p class="sub">wybierz postać i biegnij!</p>
    <div id="char-grid"></div>
    <button id="start-btn" disabled>START</button>
    <div class="lb-wrap" style="margin-top:1em;">
      <h3>TOP WYNIKI</h3>
      <ul id="lb-lobby"></ul>
    </div>
  </div>

  <!-- GAME -->
  <div id="game-screen">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <span id="hud-score">0</span>
      <span id="hud-hi">HI: 0</span>

    </div>
    <!-- gameover drawn on canvas -->
  <!-- gameover HTML overlay (desktop only) -->
    <div id="gameover">
      <h2>GAME OVER</h2>
      <p id="go-score"></p>
      <p id="go-best"></p>
      <div class="lb-wrap"><h3>TOP WYNIKI</h3><ul id="lb-go"></ul></div>
      <div class="btn-row">
        <button class="go-btn" id="btn-retry">JESZCZE RAZ</button>
        <button class="go-btn" id="btn-menu">MENU</button>
      </div>
    </div>
  </div>
</div>

// ── IMAGE LOADING ────────────────────────────────────────────
const loadedF1 = {};
const loadedF2 = {};

function loadAllSprites(cb) {
  let pending = CHARS.length * 2;
  const done  = () => { if (--pending === 0) cb(); };
  CHARS.forEach(ch => {
    const a = new Image();
    a.onload  = () => { loadedF1[ch.name] = a; done(); };
    a.onerror = () => { console.warn('f1 failed', ch.name); done(); };
    a.src = 'data:image/png;base64,' + ch.f1;

    const b = new Image();
    b.onload  = () => { loadedF2[ch.name] = b; done(); };
    b.onerror = () => { console.warn('f2 failed', ch.name); done(); };
    b.src = 'data:image/png;base64,' + ch.f2;
  });
}

// ── LEADERBOARD ──────────────────────────────────────────────
function getLB() {
  try {
    const stored = localStorage.getItem('mob_lb');
    if (stored) return JSON.parse(stored);
  } catch(e) {}
  return memLB.length ? memLB : [];
}
function getHi() { const lb = getLB(); return lb.length ? lb[0].score : 0; }
// In-memory fallback leaderboard (used when localStorage is blocked)
let memLB = [];

function saveLB(name, score) {
  try {
    const lb = getLB();
    lb.push({ name, score });
    lb.sort((a,b) => b.score - a.score);
    const trimmed = lb.slice(0,10);
    localStorage.setItem('mob_lb', JSON.stringify(trimmed));
    memLB = trimmed;
  } catch(e) {
    // localStorage blocked (local file on some mobile browsers) - use memory
    memLB.push({ name, score });
    memLB.sort((a,b) => b.score - a.score);
    memLB = memLB.slice(0,10);
  }
}
function renderLB(ulId) {
  const lb = getLB();
  document.getElementById(ulId).innerHTML =
    lb.slice(0,5).map((e,i) => `<li>${i+1}. ${e.name} \u2014 ${e.score}</li>`).join('');
}

// ── LOBBY ────────────────────────────────────────────────────
let selectedChar = null;

function buildLobby() {
  const grid     = document.getElementById('char-grid');
  const startBtn = document.getElementById('start-btn');
  grid.innerHTML = '';

  CHARS.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'char-card';

    const wrap = document.createElement('div');
    wrap.className = 'char-thumb';

    const img = new Image();
    img.width   = 60;
    img.height  = 72;
    img.alt     = ch.name;
    img.decoding = 'async';
    img.src = 'data:image/png;base64,' + ch.f1;
    wrap.appendChild(img);

    const label = document.createElement('span');
    label.textContent = ch.name;
    card.appendChild(wrap);
    card.appendChild(label);

    function selectCard() {
      document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedChar = ch.name;
      startBtn.disabled = false;
    }
    card.addEventListener('click', selectCard);
    card.addEventListener('touchend', e => { e.preventDefault(); selectCard(); });

    grid.appendChild(card);
  });
  renderLB('lb-lobby');
}

// ── GAME ENGINE ──────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let W, H, GROUND;

// Character target height - sized to feel right against obstacles
const CHAR_TARGET_H = 90; // px in canvas coords

function resize() {
  W = canvas.width  = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
  GROUND = H * 0.78;
}
window.addEventListener('resize', () => { resize(); if (state === 'running') initPlayer(); });

let state     = 'lobby';
let score     = 0;
let gameSpeed = 0;   // px per FRAME - recalculated per-frame from elapsed time
const BASE_SPEED_PPS = 420;   // pixels per SECOND at score=0  (same on all devices)
const SPEED_RAMP     = 0.8;   // extra px/s per score point

let animTimer = 0;
let animFrame = 0;
const ANIM_MS = 300;

let player    = {};
let obstacles = [];
let nextObst  = 0;  // distance in px until next obstacle
let clouds    = [];
let groundOff = 0;
let rAF       = null;
let lastTime  = 0;

// Physics constants - also time-based so they feel identical on all devices
const GRAVITY_PPS2 = 2400;  // px/s²
const JUMP_VEL_PPS = -920;  // px/s

function initPlayer() {
  const img   = loadedF1[selectedChar];
  const scale = CHAR_TARGET_H / img.naturalHeight;
  const pw    = img.naturalWidth  * scale;
  const ph    = img.naturalHeight * scale;
  player = { x: W*0.15, y: GROUND-ph, w: pw, h: ph, vy: 0, onGround: true, jumping: false };
}

function jump() {
  if (state === 'running' && player.onGround) {
    player.vy      = JUMP_VEL_PPS;
    player.onGround = false;
    player.jumping  = true;
  }
}

function initClouds() {
  clouds = [];
  for (let i = 0; i < 5; i++)
    clouds.push({ x: Math.random()*W, y: H*0.05+Math.random()*H*0.28,
                  r: 22+Math.random()*38, speed: 0.3+Math.random()*0.4 });
}

function spawnObstacle() {
  // Flying obstacles unlock after score 40
  const doFlyer = score > 40 && Math.random() < 0.3;
  if (doFlyer) { spawnFlyer(); return; }
  // Ground obstacle varieties
  const kind = Math.floor(Math.random()*3);
  const count = kind === 0 ? Math.floor(Math.random()*2)+1 : 1;
  const bw = kind===2 ? 38+Math.random()*18 : 20+Math.random()*12;
  const bh = kind===2 ? 22+Math.random()*16 : 50+Math.random()*50;
  const gcols = ['#3a7d44','#2d6a4f','#52b788','#40916c'];
  const rcols = ['#7a5c3a','#8a6a48','#6a4c2a'];
  const pcols = ['#6a3d8a','#7a4d9a','#5a2d7a'];
  const col = kind===0 ? gcols[Math.floor(Math.random()*gcols.length)]
             : kind===1 ? rcols[Math.floor(Math.random()*rcols.length)]
             : pcols[Math.floor(Math.random()*pcols.length)];
  obstacles.push({
    kind: kind===0?'cactus': kind===1?'rock':'crystal',
    x: W+20, y: GROUND-bh,
    w: bw*count+(count-1)*4, h: bh, bw, count, col
  });
}

function spawnFlyer() {
  // Three heights: low (duck), mid (must jump), high (pass under)
  const heights = [
    GROUND - CHAR_TARGET_H*0.4,
    GROUND - CHAR_TARGET_H*0.82,
    GROUND - CHAR_TARGET_H*1.35,
  ];
  const fy = heights[Math.floor(Math.random()*heights.length)];
  const fw = 44+Math.random()*20, fh = 24+Math.random()*12;
  obstacles.push({ kind:'flyer', x:W+20, y:fy-fh/2, w:fw, h:fh, bw:fw, count:1, col:'#8B4513', wing:0 });
}

function drawBG() {
  const sky = ctx.createLinearGradient(0,0,0,GROUND);
  sky.addColorStop(0,'#1a1a2e'); sky.addColorStop(1,'#16213e');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  clouds.forEach(c => {
    ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(c.x+c.r*0.6,c.y-c.r*0.3,c.r*0.7,0,Math.PI*2); ctx.fill();
  });

  ctx.fillStyle = '#2d4a22'; ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.fillStyle = '#3a7d44'; ctx.fillRect(0,GROUND,W,5);
  ctx.fillStyle = 'rgba(74,158,92,0.3)';
  for (let i=0;i<18;i++) {
    const gx = ((i*90 - groundOff)%W+W)%W;
    ctx.fillRect(gx, GROUND+8, 35, 3);
  }
}

function drawObstacles() {
  obstacles.forEach(ob => {
    if (ob.kind === 'flyer') { drawFlyer(ob); return; }
    for (let i=0;i<ob.count;i++) {
      const ox = ob.x+i*(ob.bw+4);
      if (ob.kind === 'rock') {
        ctx.fillStyle = ob.col; ctx.fillRect(ox,ob.y,ob.bw,ob.h);
        ctx.fillStyle = '#b89060'; ctx.fillRect(ox+3,ob.y+3,ob.bw-6,ob.h*0.35);
        ctx.strokeStyle='#4a3020'; ctx.lineWidth=2; ctx.strokeRect(ox,ob.y,ob.bw,ob.h);
      } else if (ob.kind === 'crystal') {
        ctx.fillStyle = ob.col; ctx.fillRect(ox,ob.y+8,ob.bw,ob.h-8);
        ctx.fillStyle = '#c070ff';
        ctx.beginPath(); ctx.moveTo(ox,ob.y+8); ctx.lineTo(ox+ob.bw/2,ob.y-4); ctx.lineTo(ox+ob.bw,ob.y+8); ctx.fill();
        ctx.strokeStyle='#3a1060'; ctx.lineWidth=2; ctx.strokeRect(ox,ob.y+8,ob.bw,ob.h-8);
      } else {
        // cactus
        ctx.fillStyle = ob.col; ctx.fillRect(ox,ob.y,ob.bw,ob.h);
        ctx.strokeStyle='#1a3d22'; ctx.lineWidth=2; ctx.strokeRect(ox,ob.y,ob.bw,ob.h);
        ctx.fillStyle='#52b788'; ctx.fillRect(ox-4,ob.y,ob.bw+8,7);
        if (ob.h > 55) {
          const ay = ob.y+ob.h*0.38;
          ctx.fillStyle=ob.col;
          ctx.fillRect(ox-8,ay,9,12); ctx.fillRect(ox-8,ay,9,5);
          ctx.fillRect(ox+ob.bw,ay+8,9,12); ctx.fillRect(ox+ob.bw,ay+8,9,5);
        }
      }
    }
  });
}

function drawFlyer(ob) {
  ob.wing = (ob.wing||0) + 0.18;
  const flap = Math.sin(ob.wing)*7;
  const cx = ob.x+ob.bw/2, cy = ob.y+ob.h/2;
  // wings
  ctx.fillStyle='#A0522D';
  ctx.beginPath(); ctx.moveTo(cx-ob.bw*0.08,cy);
  ctx.lineTo(cx-ob.bw*0.58,cy-ob.h*0.55-flap);
  ctx.lineTo(cx-ob.bw*0.5,cy+ob.h*0.3); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx+ob.bw*0.08,cy);
  ctx.lineTo(cx+ob.bw*0.58,cy-ob.h*0.55-flap);
  ctx.lineTo(cx+ob.bw*0.5,cy+ob.h*0.3); ctx.closePath(); ctx.fill();
  // body
  ctx.fillStyle='#8B4513';
  ctx.beginPath(); ctx.ellipse(cx,cy,ob.bw*0.32,ob.h*0.38,0,0,Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle='#8B4513';
  ctx.beginPath(); ctx.ellipse(cx-ob.bw*0.28,cy-ob.h*0.08,ob.h*0.26,ob.h*0.22,-0.3,0,Math.PI*2); ctx.fill();
  // beak
  ctx.fillStyle='#DAA520';
  ctx.beginPath(); ctx.moveTo(cx-ob.bw*0.46,cy-ob.h*0.1);
  ctx.lineTo(cx-ob.bw*0.7,cy+ob.h*0.04);
  ctx.lineTo(cx-ob.bw*0.46,cy+ob.h*0.13); ctx.closePath(); ctx.fill();
  // eye
  ctx.fillStyle='#ff3333';
  ctx.beginPath(); ctx.arc(cx-ob.bw*0.33,cy-ob.h*0.17,2.5,0,Math.PI*2); ctx.fill();
}

function drawPlayer() {
  const img   = (player.jumping || animFrame===0) ? loadedF1[selectedChar] : loadedF2[selectedChar];
  const scale = CHAR_TARGET_H / loadedF1[selectedChar].naturalHeight;
  const pw    = img.naturalWidth  * scale;
  const ph    = img.naturalHeight * scale;
  const drawY = player.y + player.h - ph;        // bottom-align: feet stay planted
  const drawX = player.x - (pw - player.w) / 2; // horizontally centred on hitbox
  ctx.drawImage(img, drawX, drawY, pw, ph);
}

function collides(a, b) {
  const p = 8;
  return a.x+p < b.x+b.w-p && a.x+a.w-p > b.x+p && a.y+p < b.y+b.h && a.y+a.h > b.y+p;
}

function loop(ts) {
  // dt in SECONDS - physics is time-based, same speed on all devices
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  if (state !== 'running') return;

  // Speed in px/s grows with score
  const speedPPS = BASE_SPEED_PPS + score * SPEED_RAMP;
  const dx       = speedPPS * dt; // pixels to move this frame

  score += dt * 4; // ~4 pts/second at start

  // Animation (300 ms per frame swap)
  if (!player.jumping) {
    animTimer += dt * 1000;
    if (animTimer >= ANIM_MS) { animFrame = 1-animFrame; animTimer=0; }
  } else { animTimer=0; animFrame=0; }

  // Clouds
  clouds.forEach(c => {
    c.x -= c.speed * dx * 0.15;
    if (c.x+c.r < 0) { c.x=W+c.r; c.y=H*0.05+Math.random()*H*0.28; }
  });

  groundOff = (groundOff + dx) % W;

  // Physics
  player.vy += GRAVITY_PPS2 * dt;
  player.y  += player.vy * dt;
  if (player.y >= GROUND - player.h) {
    player.y = GROUND - player.h;
    player.vy=0; player.onGround=true; player.jumping=false;
  }

  // Obstacles
  nextObst -= dx;
  if (nextObst <= 0) {
    spawnObstacle();
    nextObst = 700 + Math.random()*600 - score*0.1;
    nextObst = Math.max(nextObst, 400);
  }
  obstacles.forEach(ob => { ob.x -= dx; });
  obstacles = obstacles.filter(ob => ob.x+ob.w > -60);

  for (const ob of obstacles) { if (collides(player,ob)) { endGame(); return; } }

  drawBG(); drawObstacles(); drawPlayer();

  document.getElementById('hud-score').textContent = Math.floor(score);
  document.getElementById('hud-hi').textContent    = 'HI: '+Math.max(getHi(), Math.floor(score));

  rAF = requestAnimationFrame(loop);
}

function startGame() {
  document.getElementById('lobby').style.display       = 'none';
  document.getElementById('game-screen').style.display = 'block';
  if (!IS_MOBILE) { const go=document.getElementById('gameover'); if(go) go.style.display='none'; }
  resize(); initClouds(); initPlayer();
  obstacles=[]; score=0; animTimer=0; animFrame=0; nextObst=W*0.8; groundOff=0;
  state='running'; lastTime=performance.now();
  rAF = requestAnimationFrame(loop);
}

let _bgm = null;
let _muted = false;
let _started = false;

function _b64ToBlob(b64, mime) {
  var bin = atob(b64);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], {type: mime});
}

function _initBgm() {
  if (_bgm) return;
  _bgm = document.createElement('audio');
  _bgm.loop = true;
  _bgm.volume = 0.6;
  // Try OGG first (smaller, better loop support), fallback to MP3
  var canOgg = !!_bgm.canPlayType && _bgm.canPlayType('audio/ogg') !== '';
  var b64  = canOgg ? _OGG_B64 : _MP3_B64;
  var mime = canOgg ? 'audio/ogg' : 'audio/mpeg';
  try {
    var blob = _b64ToBlob(b64, mime);
    _bgm.src = URL.createObjectURL(blob);
  } catch(e) {
    // Last resort: try data URI directly
    _bgm.src = 'data:' + mime + ';base64,' + b64;
  }
  document.body.appendChild(_bgm);
}

function musicPlay() {
  _initBgm();
  if (!_bgm || _muted) return;
  _bgm.currentTime = 0;
  var p = _bgm.play();
  if (p && p.catch) p.catch(function(e) {
    // If still blocked, retry on next user interaction
    function retry() {
      if (_started) _bgm.play().catch(function(){});
      document.removeEventListener('touchstart', retry);
      document.removeEventListener('click', retry);
    }
    document.addEventListener('touchstart', retry, {once: true});
    document.addEventListener('click', retry, {once: true});
  });
  _started = true;
}

function musicStop() {
  if (!_bgm) return;
  _bgm.pause();
  _bgm.currentTime = 0;
  _started = false;
}

function toggleMute() {
  _muted = !_muted;
  if (_bgm) _bgm.volume = _muted ? 0 : 0.6;
  var btn = document.getElementById('mute-btn');
  if (btn) btn.textContent = _muted ? 'OFF' : 'ON';
}

// ── GAMEOVER STATE ────────────────────────────────────────────────────────────
let goBtnRetry = {x:0,y:0,w:0,h:0};
let goBtnMenu  = {x:0,y:0,w:0,h:0};
let goScore = 0;

function endGame() {
  if (state === 'dead') return;
  state = 'dead';
  cancelAnimationFrame(rAF);
  rAF = null;
  musicStop();
  goScore = Math.floor(score);
  try { saveLB(selectedChar, goScore); } catch(e) {}
  try {
    if (IS_MOBILE) {
      showGameOverCanvas();
    } else {
      showGameOverHTML();
    }
  } catch(e) {
    // Last resort: if anything fails, force draw a minimal gameover on canvas
    try {
      ctx.fillStyle = 'rgba(0,0,0,0.9)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#f0e040';
      ctx.textAlign = 'center';
      ctx.font = 'bold 48px sans-serif';
      ctx.fillText('GAME OVER', W/2, H/2 - 60);
      ctx.font = '28px sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Wynik: ' + goScore, W/2, H/2);
      ctx.fillStyle = '#f0e040';
      ctx.fillRect(W/2 - 120, H/2 + 40, 240, 60);
      ctx.fillStyle = '#1a1a2e';
      ctx.font = 'bold 24px sans-serif';
      ctx.fillText('JESZCZE RAZ', W/2, H/2 + 78);
      goBtnRetry = {x: W/2-120, y: H/2+40, w: 240, h: 60};
      goBtnMenu  = {x: -999, y: -999, w: 1, h: 1};
    } catch(e2) {}
  }
}

// MOBILE path: draw everything on the canvas
function showGameOverCanvas() {
  try {
    // Step 1: dark overlay - if this works we know canvas context is alive
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    ctx.fillStyle = 'rgba(0,0,0,0.82)';
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2;
    const fs = Math.min(W, H); // base font scale on smaller dimension
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // GAME OVER title
    ctx.font = 'bold ' + Math.round(fs*0.09) + 'px Courier New';
    ctx.fillStyle = '#b8a800';
    ctx.fillText('GAME OVER', cx+3, H*0.18+3);
    ctx.fillStyle = '#f0e040';
    ctx.fillText('GAME OVER', cx, H*0.18);

    // Scores - use only ASCII
    ctx.font = Math.round(fs*0.045) + 'px Courier New';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('Wynik: ' + goScore, cx, H*0.31);
    ctx.fillText('Rekord: ' + getHi(), cx, H*0.39);

    // Leaderboard header
    ctx.font = 'bold ' + Math.round(fs*0.038) + 'px Courier New';
    ctx.fillStyle = '#f0e040';
    ctx.fillText('TOP WYNIKI', cx, H*0.47);

    // Leaderboard entries
    ctx.font = Math.round(fs*0.034) + 'px Courier New';
    ctx.fillStyle = '#cccccc';
    const lb = getLB().slice(0, 5);
    lb.forEach((e, idx) => {
      ctx.fillText((idx+1) + '. ' + e.name + ' - ' + e.score, cx, H*0.55 + idx*(H*0.058));
    });

    // Buttons
    const btnW = Math.min(W*0.38, 200);
    const btnH = Math.max(H*0.1, 48);
    const gap  = W * 0.05;
    const bx1  = cx - gap/2 - btnW;
    const bx2  = cx + gap/2;
    const by   = H * 0.83;

    // Retry
    ctx.fillStyle = '#f0e040';
    roundRect(ctx, bx1, by - btnH/2, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.font = 'bold ' + Math.round(fs*0.036) + 'px Courier New';
    ctx.fillText('JESZCZE RAZ', bx1 + btnW/2, by);

    // Menu
    ctx.fillStyle = '#444444';
    roundRect(ctx, bx2, by - btnH/2, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.fillText('MENU', bx2 + btnW/2, by);

    ctx.restore();

    // Hit areas with big padding for fat fingers
    const pad = 20;
    goBtnRetry = {x: bx1-pad, y: by-btnH/2-pad, w: btnW+pad*2, h: btnH+pad*2};
    goBtnMenu  = {x: bx2-pad, y: by-btnH/2-pad, w: btnW+pad*2, h: btnH+pad*2};

  } catch(err) {
    // Last resort fallback: use an alert so player knows the run ended
    alert('GAME OVER!\nWynik: ' + goScore + '\nNacisnij OK aby wrocic do menu.');
    goMenu();
  }
}

// DESKTOP path: show the HTML overlay
function showGameOverHTML() {
  document.getElementById('go-score').textContent = 'Twoj wynik: ' + goScore;
  document.getElementById('go-best').textContent  = 'Rekord: ' + getHi();
  renderLB('lb-go');
  document.getElementById('gameover').style.display = 'flex';
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function hitBtn(bx, by, btn) {
  return bx >= btn.x && bx <= btn.x+btn.w && by >= btn.y && by <= btn.y+btn.h;
}

function goMenu() {
  state = 'lobby';
  if (rAF) { cancelAnimationFrame(rAF); rAF = null; }
  musicStop();
  if (!IS_MOBILE) {
    const go = document.getElementById('gameover');
    if (go) go.style.display = 'none';
  }
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('lobby').style.display = 'flex';
  selectedChar = null;
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('start-btn').disabled = true;
  renderLB('lb-lobby');
}

// ── CONTROLS ─────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp') {
    e.preventDefault();
    if (state === 'running') jump();
  }
});

function handleCanvasInput(cx, cy) {
  if (state === 'running') {
    jump();
  } else if (state === 'dead') {
    if (hitBtn(cx, cy, goBtnRetry)) startGame();
    else if (hitBtn(cx, cy, goBtnMenu)) goMenu();
  }
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  handleCanvasInput(
    (t.clientX - rect.left) * scaleX,
    (t.clientY - rect.top)  * scaleY
  );
}, {passive: false});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  handleCanvasInput(
    (e.clientX - rect.left) * scaleX,
    (e.clientY - rect.top)  * scaleY
  );
});

document.getElementById('start-btn').addEventListener('click', startGame);
// Desktop: wire HTML overlay buttons
if (!IS_MOBILE) {
  document.getElementById('btn-retry').addEventListener('click', startGame);
  document.getElementById('btn-menu').addEventListener('click', goMenu);
}

// ── INIT ─────────────────────────────────────────────────────
resize();
loadAllSprites(() => { buildLobby(); });
</script>
